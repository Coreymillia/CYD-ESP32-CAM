; ESP32-CAM Live Feed — AI Thinker ESP32-CAM
; Connects to CYD SoftAP "StickVCam", serves JPEG frames on demand.
; Flash with programmer attached to the UART pins (GPIO0 LOW to enter flash mode).

[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino

monitor_speed = 115200

board_build.partitions = huge_app.csv
board_build.f_cpu      = 240000000L

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=0
